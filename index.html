<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        .hidden { display: none; }
    </style>
    <script>
        window.onload = function() {
            var img = new Image();
            img.src = 'profile.jpg';
            img.onload = function() {
                document.getElementById('profile-image').src = 'profile.jpg';
                document.getElementById('icon').classList.remove('hidden');
                document.getElementById('text').classList.remove('hidden');
            };
            img.onerror = function() {
                console.error('Image not found.');
            };
        };
    </script>
</head>
<body>
    <img id="profile-image" src="profile.jpg" alt="Profile Photo">
    <div id="icon" class="hidden">Icon Here</div>
    <div id="text" class="hidden">Text Here</div>
</body>
</html>
